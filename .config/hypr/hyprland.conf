### MONITORS ###
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=HDMI-A-1, 1920x1080@144, auto, 1

### ENVIRONMENT ###
source = ~/.config/hypr/hyprenv.conf

### AUTOSTART ###
source = ~/.config/hypr/hyprstart.conf

### KEYBINDINGSS ###
source = ~/.config/hypr/hyprbinds.conf

### LOOK AND FEEL ###
source = ~/.config/hypr/hyprlook.conf

### WINDOWS AND WORKSPACES ###
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
windowrulev2 = suppressevent maximize, class:.*

# Workspaces
workspace = special:sfx
workspace = special:magic
workspace = 1, persistent:true, default:true
workspace = 2, persistent:true 
workspace = 3, persistent:true 
workspace = 4  #, persistent:true
workspace = 5  #, persistent:true
workspace = 6  #, persistent:true
workspace = 7  #, persistent:true
workspace = 8  #, persistent:true
